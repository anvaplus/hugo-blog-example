colorScheme = "fire"
defaultAppearance = "dark"
autoSwitchAppearance = true
enableSearch = true
enableCodeCopy = true
mainSections = ["blog"]
smartTOC = true
hotlinkFeatureImage = true
defaultFeaturedImage = "img/default.svg"
defaultSocialImage = "img/default.svg"
highlightCurrentMenuArea = true

[header]
  layout = "fixed-fill-blur"

[footer]
  showMenu = true
  showCopyright = true
  showThemeAttribution = false
  showAppearanceSwitcher = true
  showScrollToTop = true

[homepage]
  layout = "profile"
  showRecent = true
  showRecentItems = 9
  showMoreLink = true
  showMoreLinkDest = "/blog"
  showCards = true
  cardView = false
  cardViewScreenWidth = false

[article]
  showDate = true
  showDateUpdated = false
  showAuthor = true
  showZenMode = true
  showHero = true
  heroStyle = "big"
  showBreadcrumbs = false
  showHeadingAnchors = true
  showPagination = true
  showReadingTime = true
  showTableOfContents = true
  showTaxonomies = true
  showWordCount = false
  showComments = false
  sharingLinks = ["linkedin", "x-twitter", "reddit", "telegram"]
  showRelatedContent = false
  relatedContentLimit = 3

[list]
  showHero = false
  showBreadcrumbs = false
  showSummary = true
  showCards = true
  groupByYear = true
  cardView = false
  cardViewScreenWidth = false

[taxonomy]
  showTermCount = true
  showCards = true
  cardView = false

[term]
  showCards = true
  cardView = false
  groupByYear = false
